server {
    listen 80;
    server_name _;
    server_tokens off;  # hide nginx version from response headers

    root /usr/share/nginx/html;
    index index.html;

    # ── Gzip compression ────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml text/javascript image/svg+xml;

    # ── Security headers ────────────────────────────────────────────────────────
    # These override the <meta http-equiv="Content-Security-Policy"> in index.html.
    # Adjust connect-src to include your admin backend origin if not using the
    # /api/ proxy block below.
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    add_header Content-Security-Policy
        "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' data: https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self' ws: wss:;"
        always;

    # ── SPA fallback — serve index.html for all unknown routes ──────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Proxy: Admin API ────────────────────────────────────────────────────────
    # Uncomment and configure when deploying with a known backend host.
    # Set ADMIN_URL at runtime via envsubst or Docker env, e.g.:
    #   docker run -e ADMIN_URL=http://admin-backend:8081 ...
    #
    # location /api/ {
    #     proxy_pass $ADMIN_URL;
    #     proxy_set_header Host $host;
    #     proxy_set_header X-Real-IP $remote_addr;
    #     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    #     proxy_set_header X-Forwarded-Proto $scheme;
    #     # SSE: disable buffering so events stream to the browser immediately
    #     proxy_buffering off;
    #     proxy_cache off;
    #     proxy_read_timeout 3600s;
    # }

    # ── Static asset caching ────────────────────────────────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        # Repeat security headers (nginx add_header doesn't inherit in sub-blocks)
        add_header X-Content-Type-Options "nosniff" always;
    }

    # ── Health check endpoint ───────────────────────────────────────────────────
    location /health {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}

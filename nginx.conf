server {
    listen 80;
    server_name _;
    server_tokens off;  # hide nginx version from response headers

    root /usr/share/nginx/html;
    index index.html;

    # ── Gzip compression ────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml text/javascript image/svg+xml;

    # ── Security headers ────────────────────────────────────────────────────────
    # These override the <meta http-equiv="Content-Security-Policy"> in index.html.
    #
    # connect-src is 'self' only: deploy the SPA same-origin with the admin API via
    # the /api proxy block below. If the admin/OAuth backend is a DIFFERENT origin,
    # add it explicitly here — never use a wildcard, and never re-introduce open
    # ws:/wss: (an open WebSocket scheme is an XSS data-exfiltration channel on a
    # Tier-0 console).
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    add_header Content-Security-Policy
        "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' data: https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self'; object-src 'none'; base-uri 'self'; frame-ancestors 'none'; form-action 'self'"
        always;
    # Trusted Types in report-only first: gather violations from PrimeVue/Chart/Vue
    # before flipping to enforcement (require-trusted-types-for 'script' in the
    # enforcing policy above). Point report-uri at the CSP-ingestion endpoint once
    # it ships (Sprint 5); until then reports are simply dropped.
    add_header Content-Security-Policy-Report-Only
        "require-trusted-types-for 'script'; trusted-types 'allow-duplicates'; report-uri /api/admin/security/csp-report"
        always;

    # ── SPA fallback — serve index.html for all unknown routes ──────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Proxy: Admin API ────────────────────────────────────────────────────────
    # Uncomment and configure when deploying with a known backend host.
    # Set ADMIN_URL at runtime via envsubst or Docker env, e.g.:
    #   docker run -e ADMIN_URL=http://admin-backend:8081 ...
    #
    # location /api/ {
    #     proxy_pass $ADMIN_URL;
    #     proxy_set_header Host $host;
    #     proxy_set_header X-Real-IP $remote_addr;
    #     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    #     proxy_set_header X-Forwarded-Proto $scheme;
    #     # SSE: disable buffering so events stream to the browser immediately
    #     proxy_buffering off;
    #     proxy_cache off;
    #     proxy_read_timeout 3600s;
    # }

    # ── Static asset caching ────────────────────────────────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        # Repeat security headers (nginx add_header doesn't inherit in sub-blocks)
        add_header X-Content-Type-Options "nosniff" always;
    }

    # ── Health check endpoint ───────────────────────────────────────────────────
    location /health {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}
